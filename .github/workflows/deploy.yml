name: Deploy to GitHub Pages

# Запускается при пуше в ветку main (и вручную через Actions UI)
on:
  push:
    branches: [main]
  workflow_dispatch:

# Права для публикации на GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Не запускать одновременно несколько деплоев
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── 1. Сборка ───────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (static export → out/)
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  # ── 2. Деплой ───────────────────────────────────────────────────────────────
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
