    <path d="M250,148 Q230,130 215,108 Q205,90 210,72" stroke="#3a5028" stroke-width="3.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M250,148 Q270,130 285,108 Q295,90 290,72" stroke="#3a5028" stroke-width="3.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M250,148 Q248,118 250,90" stroke="#3a5028" stroke-width="5.0" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- листья/точки -->
    <circle cx="210" cy="72" r="7" fill="#3a5028"/>
    <circle cx="290" cy="72" r="7" fill="#3a5028"/>
    <circle cx="250" cy="64" r="9" fill="#3a5028"/>
    <circle cx="148" cy="206" r="6" fill="#3a5028"/>
    <circle cx="352" cy="206" r="6" fill="#3a5028"/>
